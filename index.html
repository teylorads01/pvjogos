<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>Jogos Bíblicos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&family=Baloo+2:wght@400;600;700;800&display=swap" rel="stylesheet">
    <script>
      window.addEventListener("load", function () {
        var loadTrackingScripts = function () {
          var utms = document.createElement("script");
          utms.src = "https://cdn.utmify.com.br/scripts/utms/latest.js";
          utms.async = true;
          utms.defer = true;
          utms.setAttribute("data-utmify-prevent-xcod-sck", "");
          utms.setAttribute("data-utmify-prevent-subids", "");
          document.head.appendChild(utms);

          window.pixelId = "69d92842c3d7adf3c4b111e7";
          var pixel = document.createElement("script");
          pixel.async = true;
          pixel.defer = true;
          pixel.src = "https://cdn.utmify.com.br/scripts/pixel/pixel.js";
          document.head.appendChild(pixel);
        };

        if ("requestIdleCallback" in window) {
          window.requestIdleCallback(loadTrackingScripts, { timeout: 2500 });
        } else {
          setTimeout(loadTrackingScripts, 1200);
        }
      });
    </script>
    <script defer src="./script.js"></script>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
